name: Bootstrap GCP Infra

on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      GCP_ZONE: ${{ vars.GCP_ZONE || 'us-central1-a' }}
      GCP_ENVIRONMENT: ${{ vars.GCP_ENVIRONMENT || 'prod' }}
      SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      SUPABASE_BUCKET_ARQUIVOS_PROJETO: ${{ vars.SUPABASE_BUCKET_ARQUIVOS_PROJETO || 'arquivos-projeto' }}
      ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
      ALLOWED_HOSTS: ${{ vars.ALLOWED_HOSTS || 'localhost,127.0.0.1,*.run.app,*.web.app,*.firebaseapp.com' }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate required GitHub configuration
        shell: bash
        run: |
          required_vars=(
            GCP_PROJECT_ID
            GCP_REGION
            SUPABASE_URL
            ALLOWED_ORIGINS
          )
          for key in "${required_vars[@]}"; do
            if [ -z "${!key}" ]; then
              echo "Missing GitHub variable: $key"
              exit 1
            fi
          done

          required_secrets=(
            GCP_WORKLOAD_IDENTITY_PROVIDER
            GCP_SERVICE_ACCOUNT
            SUPABASE_KEY
          )
          for key in "${required_secrets[@]}"; do
            if [ -z "${!key}" ]; then
              echo "Missing GitHub secret: $key"
              exit 1
            fi
          done
        env:
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: true

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Build terraform.auto.tfvars
        shell: bash
        working-directory: infra/gcp
        run: |
          python - <<'PY'
          import os
          import textwrap
          from pathlib import Path

          def hcl_string(value: str) -> str:
              escaped = value.replace("\\", "\\\\").replace('"', '\\"')
              return f'"{escaped}"'

          def hcl_list_csv(raw: str) -> str:
              items = [item.strip() for item in raw.split(",") if item.strip()]
              return "[" + ", ".join(hcl_string(item) for item in items) + "]"

          content = textwrap.dedent(f"""\
              id_projeto = {hcl_string(os.environ['GCP_PROJECT_ID'])}
              ambiente = {hcl_string(os.environ['GCP_ENVIRONMENT'])}
              regiao = {hcl_string(os.environ['GCP_REGION'])}
              zona_principal = {hcl_string(os.environ['GCP_ZONE'])}

              supabase_url = {hcl_string(os.environ['SUPABASE_URL'])}
              supabase_bucket_arquivos_projeto = {hcl_string(os.environ['SUPABASE_BUCKET_ARQUIVOS_PROJETO'])}

              allowed_origins = {hcl_list_csv(os.environ['ALLOWED_ORIGINS'])}
              allowed_hosts = {hcl_list_csv(os.environ['ALLOWED_HOSTS'])}

              bootstrap_secret_versions = true
              segredos_ja_criados = false
              valor_supabase_key = {hcl_string(os.environ['SUPABASE_KEY'])}

              criar_servico_api = false
              criar_job_rag = false
              agendar_job_rag = false
              criar_vm_video = false
              """)
          Path("terraform.auto.tfvars").write_text(content, encoding="utf-8")
          PY
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Terraform init
        working-directory: infra/gcp
        run: terraform init

      - name: Import bootstrap resources that already exist
        shell: bash
        working-directory: infra/gcp
        run: |
          import_if_present() {
            local address="$1"
            local import_id="$2"
            shift 2

            if terraform state show "$address" >/dev/null 2>&1; then
              echo "Resource already in state: $address"
              return 0
            fi

            if "$@" >/dev/null 2>&1; then
              echo "Importing existing resource: $address"
              terraform import -input=false "$address" "$import_id"
            else
              echo "Resource not created yet: $address"
            fi
          }

          import_if_present \
            "google_service_account.deploy_ci" \
            "projects/${GCP_PROJECT_ID}/serviceAccounts/geoadmin-deploy@${GCP_PROJECT_ID}.iam.gserviceaccount.com" \
            gcloud iam service-accounts describe "geoadmin-deploy@${GCP_PROJECT_ID}.iam.gserviceaccount.com" --project "${GCP_PROJECT_ID}"

          import_if_present \
            "google_service_account.api_runtime" \
            "projects/${GCP_PROJECT_ID}/serviceAccounts/geoadmin-api@${GCP_PROJECT_ID}.iam.gserviceaccount.com" \
            gcloud iam service-accounts describe "geoadmin-api@${GCP_PROJECT_ID}.iam.gserviceaccount.com" --project "${GCP_PROJECT_ID}"

          import_if_present \
            "google_service_account.rag_runtime" \
            "projects/${GCP_PROJECT_ID}/serviceAccounts/geoadmin-rag@${GCP_PROJECT_ID}.iam.gserviceaccount.com" \
            gcloud iam service-accounts describe "geoadmin-rag@${GCP_PROJECT_ID}.iam.gserviceaccount.com" --project "${GCP_PROJECT_ID}"

          import_if_present \
            "google_artifact_registry_repository.imagens" \
            "projects/${GCP_PROJECT_ID}/locations/${GCP_REGION}/repositories/geoadmin" \
            gcloud artifacts repositories describe "geoadmin" --location "${GCP_REGION}" --project "${GCP_PROJECT_ID}"

          import_if_present \
            'google_secret_manager_secret.segredos["SUPABASE_KEY"]' \
            "projects/${GCP_PROJECT_ID}/secrets/SUPABASE_KEY" \
            gcloud secrets describe "SUPABASE_KEY" --project "${GCP_PROJECT_ID}"

          import_if_present \
            'google_secret_manager_secret.segredos["OPENAI_API_KEY"]' \
            "projects/${GCP_PROJECT_ID}/secrets/OPENAI_API_KEY" \
            gcloud secrets describe "OPENAI_API_KEY" --project "${GCP_PROJECT_ID}"

          import_if_present \
            'google_secret_manager_secret.segredos["ANTHROPIC_API_KEY"]' \
            "projects/${GCP_PROJECT_ID}/secrets/ANTHROPIC_API_KEY" \
            gcloud secrets describe "ANTHROPIC_API_KEY" --project "${GCP_PROJECT_ID}"

      - name: Terraform validate
        working-directory: infra/gcp
        run: terraform validate

      - name: Terraform plan
        working-directory: infra/gcp
        run: terraform plan -out=tfplan

      - name: Terraform apply
        working-directory: infra/gcp
        run: terraform apply -auto-approve tfplan

      - name: Publish bootstrap summary
        shell: bash
        working-directory: infra/gcp
        run: |
          {
            echo "## Bootstrap GCP"
            echo
            echo "- Projeto: \`${GCP_PROJECT_ID}\`"
            echo "- Regiao: \`${GCP_REGION}\`"
            echo "- Runtime API: \`$(terraform output -raw email_service_account_api_runtime)\`"
            echo "- Runtime RAG: \`$(terraform output -raw email_service_account_rag_runtime)\`"
            echo "- Deploy CI: \`$(terraform output -raw email_service_account_deploy_ci)\`"
            echo "- Artifact Registry: \`$(terraform output -raw artifact_registry_repository)\`"
          } >> "$GITHUB_STEP_SUMMARY"
