name: Deploy Web (Vercel)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate deploy configuration
        run: python3 scripts/validate_deploy_config.py

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Validate production API URL
        run: |
          if [ -z "${EXPO_PUBLIC_API_BASE_URL}" ]; then
            echo "EXPO_PUBLIC_API_BASE_URL secret is required for the production web build."
            exit 1
          fi
          if [ -z "${VERCEL_ORG_ID}" ]; then
            echo "VERCEL_ORG_ID repository variable is required."
            exit 1
          fi
          if [ -z "${VERCEL_PROJECT_ID}" ]; then
            echo "VERCEL_PROJECT_ID repository variable is required."
            exit 1
          fi
        env:
          EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}

      - name: Build Expo web
        working-directory: mobile
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}

      - name: Patch fonts (move TTFs out of node_modules path)
        run: node scripts/patch-fonts.js

      - name: Prepare Vercel output
        run: |
          mkdir -p .vercel/output/static
          cp -r mobile/dist/. .vercel/output/static/
          cp scripts/vercel-output-config.json .vercel/output/config.json

      - name: Deploy to Vercel
        run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
